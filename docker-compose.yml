services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: zenail
      POSTGRES_PASSWORD: zenail
      POSTGRES_DB: zenail
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://zenail:zenail@db:5432/zenail
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_MINUTES: "10080"
      # For LAN access (e.g. http://10.0.0.11:5173), make sure your origin is included here.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3002,http://10.0.0.11:5173,http://10.0.0.11:3002,https://zenail.mathisterben.org}
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend:/app

  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      # When accessing from another device on LAN, set PUBLIC_API_BASE_URL=http://10.0.0.11:8000
      # For HTTPS behind a reverse proxy that routes /api -> backend, you can set PUBLIC_API_BASE_URL=/api
      VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3002}:5173"
    volumes:
      - ./frontend:/app

volumes:
  db_data:
